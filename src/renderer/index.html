<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FC Online Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #16213e;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #0f3460;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #e94560;
    }

    .tabs {
      display: flex;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }

    .tab {
      padding: 10px 20px;
      cursor: pointer;
      font-size: 13px;
      color: #888;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab.active {
      color: #e94560;
      border-bottom-color: #e94560;
    }

    .tab-content { display: none; flex: 1; padding: 20px; flex-direction: column; gap: 16px; }
    .tab-content.active { display: flex; }

    .status-card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 16px;
    }

    .status-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }

    .status-text {
      font-size: 14px;
      color: #a8dadc;
      min-height: 20px;
    }

    .count-display {
      font-size: 48px;
      font-weight: 700;
      color: #e94560;
      text-align: center;
      padding: 10px 0;
    }

    .count-sub {
      font-size: 12px;
      color: #666;
      text-align: center;
      margin-top: -8px;
    }

    .field-group { display: flex; flex-direction: column; gap: 6px; }

    .field-group label { font-size: 12px; color: #888; }

    .field-group input {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 8px 12px;
      font-size: 14px;
      width: 100%;
      outline: none;
    }

    .field-group input:focus { border-color: #e94560; }

    .btn-row { display: flex; gap: 10px; margin-top: 4px; }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #btnStart { background: #e94560; color: #fff; }
    #btnStop  { background: #0f3460; color: #a8dadc; }

    .error-text { color: #ff6b6b; font-size: 13px; min-height: 18px; }

    /* Capture tab */
    .capture-preview {
      background: #16213e;
      border: 1px dashed #0f3460;
      border-radius: 8px;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      cursor: crosshair;
    }

    .capture-preview img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      user-select: none;
      pointer-events: none;
    }

    .capture-preview .placeholder { color: #444; font-size: 13px; }

    #selectionRect {
      position: absolute;
      border: 2px solid #e94560;
      background: rgba(233, 69, 96, 0.1);
      pointer-events: none;
      display: none;
    }

    .ref-status { font-size: 12px; }
    .ref-status.ok { color: #57cc99; }
    .ref-status.missing { color: #ff6b6b; }

    .capture-btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

    .capture-btn-row button {
      flex: unset;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
    }

    #btnCapture { background: #0f3460; color: #a8dadc; }
    #btnSaveResults { background: #57cc99; color: #1a1a2e; }
    #btnSavePopup   { background: #e9c46a; color: #1a1a2e; }

    .hint { font-size: 11px; color: #555; line-height: 1.5; }
  </style>
</head>
<body>
  <header>
    <h1>⚽ FC Online Bot</h1>
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="auto">자동화</div>
    <div class="tab" data-tab="capture">화면 설정</div>
  </div>

  <!-- ── 자동화 탭 ── -->
  <div class="tab-content active" id="tab-auto">
    <div class="status-card">
      <div class="status-label">상태</div>
      <div class="status-text" id="statusText">대기 중</div>
    </div>

    <div class="count-display" id="matchCount">0</div>
    <div class="count-sub">완료된 경기 수</div>

    <div class="field-group">
      <label>S키 간격 (초) — 경기 중 스킵</label>
      <input type="number" id="sInterval" value="3" min="1" max="30" />
    </div>

    <div class="field-group">
      <label>경기 시작 전 대기 (초)</label>
      <input type="number" id="preDelay" value="3" min="1" max="30" />
    </div>

    <div class="error-text" id="errorText"></div>

    <div class="btn-row">
      <button id="btnStart">▶ 시작</button>
      <button id="btnStop" disabled>■ 정지</button>
    </div>
  </div>

  <!-- ── 화면 설정 탭 ── -->
  <div class="tab-content" id="tab-capture">
    <p class="hint">
      게임 화면을 해당 상태로 띄운 뒤 "스크린샷" 버튼을 누르고,<br/>
      미리보기에서 드래그로 인식할 영역을 선택한 후 저장하세요.
    </p>

    <div class="capture-preview" id="capturePreview">
      <span class="placeholder" id="previewPlaceholder">스크린샷 버튼을 눌러 캡처하세요</span>
      <img id="previewImg" style="display:none" />
      <div id="selectionRect"></div>
    </div>

    <div class="capture-btn-row">
      <button id="btnCapture">📷 스크린샷</button>
      <button id="btnSaveResults" disabled>결과 화면 저장</button>
      <button id="btnSavePopup" disabled>팝업 저장</button>
    </div>

    <div>
      <div class="ref-status" id="refResults">결과 화면 이미지: 확인 중...</div>
      <div class="ref-status" id="refPopup">팝업 이미지: 확인 중...</div>
    </div>
  </div>

  <script src="../../dist/renderer/renderer.js"></script>
</body>
</html>
