appId: com.fcbot.automation
productName: FC Online Bot

directories:
  output: dist-package

files:
  - dist/**/*
  - assets/**/*
  - node_modules/**/*
  - package.json

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.png

nsis:
  oneClick: true
  perMachine: false
  installerIcon: assets/icon.png
  uninstallerIcon: assets/icon.png
